        else if (role === 'Warehouse Manager') setCurrentView('warehouse-dashboard');

        else if (role === 'Cashier') setCurrentView('pos-terminal');
        else setCurrentView('profile');

      const [isModalOpen, setIsModalOpen] = useState(false);

      const [qty, setQty] = useState('');

      const handleAdjust = () => {
        if (!qty || isNaN(qty)) {
          triggerToast('Please enter a valid amount!', 'error');
          return;
        }
        setProducts(prev => prev.map(p => {
          if (p.id === selectedProduct.id) {
            const finalVal = p.whStock + Number(qty);
            return { ...p, whStock: finalVal, status: finalVal > 1000 ? 'HEALTHY' : 'LOW STOCK' };
          }
          return p;
        }));
        triggerToast(`Restock adjusted successfully!`);
        setIsModalOpen(false);
        setQty('');

    // --- View: Create Replenishment Order ---
    function CreateOrderView({ products, setView, triggerToast }) {
      const [items, setItems] = useState([{ productId: 1, quantity: 100 }]);
      const [warehouse, setWarehouse] = useState('Central Hub West');
      const [carrier, setCarrier] = useState('Enterprise Fleet (LTL)');

      const handleAddLine = () => {
        setItems([...items, { productId: 1, quantity: 100 }]);
      };

      const handleRemoveLine = (idx) => {
        if (items.length === 1) return;
        setItems(items.filter((_, i) => i !== idx));
      };

      const handleItemChange = (idx, field, val) => {
        setItems(items.map((item, i) => i === idx ? { ...item, [field]: Number(val) } : item));
      };

      const subtotal = items.reduce((sum, item) => {
        const prod = products.find(p => p.id === item.productId);
        return sum + (prod ? prod.price * item.quantity : 0);
      }, 0);

      const gst = subtotal * 0.18;
      const discount = subtotal > 100000 ? 5000 : 0;
      const grandTotal = subtotal + gst - discount;

      const handleSubmit = (e) => {
        e.preventDefault();
        triggerToast('Replenishment Purchase Order submitted to Depot!');
        setTimeout(() => setView('store-dashboard'), 1000);
      };

      return (
        <div className="space-y-6">
          <div className="bg-white p-6 rounded-xl border border-outline-variant/30">
            <h2 className="text-2xl font-bold text-primary">Issue restock request</h2>
            <p className="text-xs text-on-surface-variant mt-1">Issue restocking purchase order tickets to depot hubs.</p>
          </div>

          <form onSubmit={handleSubmit} className="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div className="lg:col-span-8 space-y-6">
              
              <div className="bg-white p-6 rounded-xl border border-outline-variant/30 shadow-sm grid grid-cols-2 gap-4 text-xs">
                <div>
                  <label className="block font-bold text-outline mb-2">Source Depot Warehouse</label>
                  <select value={warehouse} onChange={(e) => setWarehouse(e.target.value)} className="w-full border rounded p-2.5 bg-white">
                    <option>Central Hub West (Indore)</option>
                    <option>Central Hub North (Delhi)</option>
                  </select>
                </div>
                <div>
                  <label className="block font-bold text-outline mb-2">Carrier Delivery Method</label>
                  <select value={carrier} onChange={(e) => setCarrier(e.target.value)} className="w-full border rounded p-2.5 bg-white">
                    <option>Enterprise Fleet (LTL)</option>
                    <option>Express Third-Party Cargo</option>
                  </select>
                </div>
              </div>

              <div className="bg-white p-6 rounded-xl border border-outline-variant/30 shadow-sm space-y-4">
                <div className="flex justify-between items-center pb-2 border-b">
                  <h3 className="text-sm font-bold text-primary">Checklist lines</h3>
                  <button type="button" onClick={handleAddLine} className="bg-primary text-white font-bold px-3 py-1 rounded text-xs">Add Line</button>
                </div>

                <div className="space-y-3">
                  {items.map((item, idx) => {
                    const prod = PRODUCTS.find(p => p.id === item.productId);
                    return (
                      <div key={idx} className="flex gap-4 items-center p-3 bg-slate-50 rounded-lg text-xs">
                        <div className="flex-1">
                          <label className="block text-[9px] uppercase font-bold text-outline mb-1">Product SKU</label>
                          <select 
                            value={item.productId} 
                            onChange={(e) => handleItemChange(idx, 'productId', e.target.value)}
                            className="w-full border rounded p-2 bg-white"
                          >
                            {products.map(p => (
                              <option key={p.id} value={p.id}>{p.name} (₹{p.price}/unit)</option>
                            ))}
                          </select>
                        </div>
                        <div className="w-24">
                          <label className="block text-[9px] uppercase font-bold text-outline mb-1">Qty</label>
                          <input 
                            type="number" 
                            value={item.quantity} 
                            onChange={(e) => handleItemChange(idx, 'quantity', e.target.value)}
                            className="w-full border rounded p-2" 
                          />
                        </div>
                        <div className="w-28 text-right font-bold text-primary">
                          Line: ₹ {(prod ? prod.price * item.quantity : 0).toLocaleString()}
                        </div>
                        <button 
                          type="button" 
                          disabled={items.length === 1}
                          onClick={() => handleRemoveLine(idx)} 
                          className="text-error text-sm font-bold disabled:opacity-40"
                        >
                          Delete
                        </button>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            <div className="lg:col-span-4 bg-white p-6 rounded-xl border border-outline-variant/30 shadow-sm space-y-6 text-xs">
              <h3 className="text-sm font-bold text-primary uppercase">Financial Summary</h3>
              <div className="space-y-3">
                <div className="flex justify-between">
                  <span>Lines count</span>
                  <span>{items.length} Products</span>
                </div>
                <div className="flex justify-between">
                  <span>Subtotal</span>
                  <span>₹ {subtotal.toLocaleString()}</span>
                </div>
                <div className="flex justify-between">
                  <span>GST (18%)</span>
                  <span>₹ {gst.toLocaleString()}</span>
                </div>
                <div className="flex justify-between text-error font-medium">
                  <span>Enterprise discount</span>
                  <span>- ₹ {discount.toLocaleString()}</span>
                </div>
                <div className="pt-4 border-t border-dashed flex justify-between items-end text-sm font-bold text-primary">
                  <span>Grand Total</span>
                  <span>₹ {grandTotal.toLocaleString()}</span>

                Submit Purchase Restock

                      </button>
                    </td>

            </table>

                <p className="text-xs font-bold">{selectedProduct.name}</p>

                  <div>
                    <label className="block font-bold text-outline mb-1">Damaged Quantity</label>

                  </div>
                  <div>
                    <label className="block font-bold text-outline mb-1">Damage Reason</label>
                    <textarea value={notes} onChange={(e) => setNotes(e.target.value)} className="w-full border rounded p-2" rows="2" placeholder="Expiry, spill..." />
                  </div>
                </div>
                <div className="flex gap-2 pt-2">
                  <button onClick={() => setIsModalOpen(false)} className="flex-1 py-2 border rounded text-xs">Cancel</button>
                  <button onClick={handleWastage} className="flex-1 py-2 bg-primary text-white font-bold rounded text-xs">Submit</button>

    // --- View: POS Cashier Billing Terminal ---
    function POSTerminalView({ products, cart, setCart, triggerToast }) {
      const [search, setSearch] = useState('');
      const [selectedReceipt, setSelectedReceipt] = useState(null);
      const [isReceiptOpen, setIsReceiptOpen] = useState(false);

      const filtered = products.filter(p => p.name.toLowerCase().includes(search.toLowerCase()));

      const handleAdd = (prod) => {
        setCart(prev => {
          const exist = prev.find(item => item.id === prod.id);
          if (exist) {
            return prev.map(item => item.id === prod.id ? { ...item, qty: item.qty + 1 } : item);
          }
          return [...prev, { ...prod, qty: 1 }];
        });
        triggerToast(`${prod.name} added to cart`);
      };

      const handleQty = (id, change) => {
        setCart(prev => prev.map(item => {
          if (item.id === id) {
            const next = item.qty + change;
            return next > 0 ? { ...item, qty: next } : item;
          }
          return item;
        }).filter(item => item.qty > 0));
      };

      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      const gst = subtotal * 0.18;
      const grandTotal = subtotal + gst;

      const handleCheckout = () => {
        if (cart.length === 0) return;
        const receipt = {
          receiptNo: 'RX-' + Math.floor(100000 + Math.random() * 900000),
          date: new Date().toLocaleString(),
          items: [...cart],
          subtotal,
          gst,
          grandTotal,
          cashier: 'Priya Cashier'
        };
        setSelectedReceipt(receipt);
        setIsReceiptOpen(true);
        setCart([]);
        triggerToast('Transaction completed successfully!');
      };

      return (
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 min-h-[500px]">
          <div className="lg:col-span-8 space-y-4">
            <div className="bg-white p-4 rounded-xl border border-outline-variant/30">
              <input 
                type="text" 
                placeholder="Search products by barcode or SKU..." 
                value={search} 
                onChange={(e) => setSearch(e.target.value)} 
                className="w-full border rounded-lg p-2 text-xs outline-none focus:ring-2 focus:ring-primary"
              />
            </div>
            
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
              {filtered.map(p => (
                <div key={p.id} onClick={() => handleAdd(p)} className="bg-white p-4 rounded-xl border border-outline-variant/30 shadow-sm hover:border-primary cursor-pointer flex flex-col justify-between">
                  <div className="w-full h-24 bg-slate-100 rounded mb-3 flex items-center justify-center font-bold text-[10px] text-slate-400">HMX Product</div>
                  <h4 className="font-bold text-xs line-clamp-1">{p.name}</h4>
                  <div className="flex justify-between items-center mt-3 text-xs">
                    <span className="font-bold text-primary">₹ {p.price}</span>
                    <span className="text-[9px] bg-primary/10 text-primary font-bold px-1.5 py-0.5 rounded">Stock: {p.storeStock}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="lg:col-span-4 bg-white p-6 rounded-xl border border-outline-variant shadow-sm flex flex-col justify-between">
            <div>
              <h3 className="text-base font-bold text-primary mb-4 pb-3 border-b">Register Cart</h3>
              <div className="space-y-3 text-xs">
                {cart.map(item => (
                  <div key={item.id} className="flex justify-between items-center bg-slate-50 p-2 rounded">
                    <div className="flex-1 truncate font-bold">{item.name}</div>
                    <div className="flex items-center gap-2">
                      <button onClick={() => handleQty(item.id, -1)} className="w-5 h-5 bg-white border rounded flex items-center justify-center">-</button>
                      <span>{item.qty}</span>
                      <button onClick={() => handleQty(item.id, 1)} className="w-5 h-5 bg-white border rounded flex items-center justify-center">+</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="mt-6 border-t pt-4 space-y-4 text-xs font-semibold">
              <div className="flex justify-between"><span>Subtotal</span><span>₹ {subtotal.toFixed(2)}</span></div>
              <div className="flex justify-between"><span>GST (18%)</span><span>₹ {gst.toFixed(2)}</span></div>
              <div className="flex justify-between text-sm font-bold text-primary pt-2 border-t border-dashed">
                <span>Grand Total</span>
                <span>₹ {grandTotal.toFixed(2)}</span>
              </div>
              <button 
                onClick={handleCheckout} 
                disabled={cart.length === 0}
                className="w-full bg-primary text-white py-3 rounded-lg font-bold disabled:opacity-40 shimmer-btn"
              >
                Pay & Generate Invoice
              </button>
            </div>
          </div>

          {isReceiptOpen && selectedReceipt && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setIsReceiptOpen(false)} />
              <div className="bg-white rounded-2xl shadow-xl max-w-sm w-full p-6 relative z-10 space-y-6 border border-outline-variant font-mono text-xs text-on-surface">
                <div className="text-center space-y-1">
                  <h2 className="text-lg font-bold text-primary font-sans">SafaiBazaar Retail</h2>
                  <p className="text-[10px] text-outline">SB-IND-001 • Indore Central</p>
                  <p className="text-[9px] text-outline">GSTIN: 23AAAAA0000A1Z5</p>
                </div>
                <div className="border-t border-b border-dashed border-outline-variant py-2 space-y-1">
                  <div className="flex justify-between"><span>Receipt:</span><span className="font-bold">{selectedReceipt.receiptNo}</span></div>
                  <div className="flex justify-between"><span>Date:</span><span>{selectedReceipt.date}</span></div>
                </div>
                <div className="space-y-2 border-b border-dashed pb-4">
                  {selectedReceipt.items.map(item => (
                    <div key={item.id} className="flex justify-between">
                      <div className="flex-1 truncate pr-2">
                        <span className="font-bold">{item.name}</span>
                        <span className="text-[10px] text-outline block">{item.qty} x ₹{item.price}</span>
                      </div>
                      <span className="font-bold text-primary">₹{(item.price * item.qty).toFixed(2)}</span>
                    </div>
                  ))}
                </div>
                <div className="space-y-1">
                  <div className="flex justify-between"><span>Subtotal:</span><span>₹ {selectedReceipt.subtotal.toFixed(2)}</span></div>
                  <div className="flex justify-between font-bold text-sm text-primary pt-3 border-t">
                    <span>GRAND TOTAL:</span>
                    <span>₹ {selectedReceipt.grandTotal.toFixed(2)}</span>
                  </div>
                </div>
                <div className="flex gap-2 font-sans pt-4">
                  <button onClick={() => setIsReceiptOpen(false)} className="flex-1 py-2 border rounded">Close</button>
                  <button onClick={() => window.print()} className="flex-1 py-2 bg-primary text-white font-bold rounded">Print</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
